[build]
  base = "."
  command = "pnpm --filter client build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV = "production"

[[redirects]]
  from = "/api/*"
  to = "https://corepeptide-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
